<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直线控制小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            overflow: hidden;
            background: #f5f5f5;
        }
        #canvas {
            display: block;
            background: white;
        }
        #funcBox {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            z-index: 999;
        }
        #tip {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="funcBox">y = 1.00x + 0.00</div>
    <div id="tip">单指拖拽：平移直线<br>双指旋转：改变斜率</div>
    <canvas id="canvas"></canvas>

<script>
// ========== 核心配置 ==========
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const funcBox = document.getElementById('funcBox');

// 强制立即设置画布尺寸
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
}

let centerX, centerY;
const gridSize = 40;
let a = 1.0;
let b = 0.0;
let lastTouch = null;

// ========== 绘制坐标系 ==========
function drawCoordinate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;

    for (let x = centerX; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let x = centerX; x > 0; x -= gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    for (let y = centerY; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    for (let y = centerY; y > 0; y -= gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, centerY);
    ctx.lineTo(canvas.width, centerY);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, canvas.height);
    ctx.stroke();

    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
    ctx.fill();
}

// ========== 绘制直线 ==========
function drawLine() {
    ctx.strokeStyle = '#2196F3';
    ctx.lineWidth = 3;
    ctx.beginPath();

    let x1 = -canvas.width;
    let y1 = a * x1 + b;
    let x2 = canvas.width;
    let y2 = a * x2 + b;

    let px1 = centerX + x1;
    let py1 = centerY - y1;
    let px2 = centerX + x2;
    let py2 = centerY - y2;

    ctx.moveTo(px1, py1);
    ctx.lineTo(px2, py2);
    ctx.stroke();
}

// ========== 更新函数显示 ==========
function updateFunc() {
    let aStr = a.toFixed(2);
    let bStr = b.toFixed(2);
    funcBox.innerText = `y = ${aStr}x + ${bStr}`;
}

// ========== 触摸控制 ==========
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    lastTouch = { x: touch.clientX, y: touch.clientY };
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touches = e.touches;

    if (touches.length === 1) {
        const touch = touches[0];
        const dx = touch.clientX - lastTouch.x;
        const dy = lastTouch.y - touch.clientY;
        
        // 这里 ×80 提速
        b += dy / gridSize * 80;
        
        lastTouch = { x: touch.clientX, y: touch.clientY };
    }

    if (touches.length === 2) {
        const t1 = touches[0];
        const t2 = touches[1];
        const angle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX);
        a = -Math.tan(angle);
    }

    drawAll();
});

function drawAll() {
    drawCoordinate();
    drawLine();
    updateFunc();
}

// ========== 页面加载立即执行 ==========
window.addEventListener('load', () => {
    resizeCanvas();
    drawAll();
});

// 适配窗口变化
window.addEventListener('resize', () => {
    resizeCanvas();
    drawAll();
});
</script>
</body>
</html>
