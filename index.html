<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 微信端核心适配：禁止缩放、全屏显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直线控制小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 禁止微信浏览器默认触摸行为 */
            touch-action: manipulation;
        }
        body {
            overflow: hidden;
            background: #f5f5f5;
        }
        /* 画布：坐标系 + 直线绘制区域 */
        #canvas {
            display: block;
            background: white;
        }
        /* 右上角函数显示框 */
        #funcBox {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            z-index: 999;
        }
        /* 操作提示 */
        #tip {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="funcBox">y = 1.00x + 0.00</div>
    <div id="tip">单指拖拽：平移直线<br>双指旋转：改变斜率</div>
    <canvas id="canvas"></canvas>

<script>
// ========== 核心配置 ==========
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const funcBox = document.getElementById('funcBox');

// 设置画布尺寸 = 屏幕尺寸（全屏）
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 坐标系中心点（屏幕正中央）
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
// 坐标系网格大小（像素）
const gridSize = 40;

// 直线参数
let a = 1.0;  // 斜率
let b = 0.0;  // 截距
let lastTouch = null; // 触摸记录

// ========== 绘制坐标系 ==========
function drawCoordinate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;

    // 绘制竖网格线
    for (let x = centerX; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let x = centerX; x > 0; x -= gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    // 绘制横网格线
    for (let y = centerY; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    for (let y = centerY; y > 0; y -= gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    // 绘制X轴、Y轴（加粗）
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    // X轴
    ctx.beginPath();
    ctx.moveTo(0, centerY);
    ctx.lineTo(canvas.width, centerY);
    ctx.stroke();
    // Y轴
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, canvas.height);
    ctx.stroke();

    // 绘制原点
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
    ctx.fill();
}

// ========== 绘制直线 ==========
function drawLine() {
    ctx.strokeStyle = '#2196F3';
    ctx.lineWidth = 3;
    ctx.beginPath();

    // 计算直线两个端点（全屏绘制）
    let x1 = -canvas.width;
    let y1 = a * x1 + b;
    let x2 = canvas.width;
    let y2 = a * x2 + b;

    // 坐标系坐标转屏幕像素坐标
    let px1 = centerX + x1;
    let py1 = centerY - y1;
    let px2 = centerX + x2;
    let py2 = centerY - y2;

    ctx.moveTo(px1, py1);
    ctx.lineTo(px2, py2);
    ctx.stroke();
}

// ========== 更新函数解析式显示 ==========
function updateFunc() {
    let aStr = a.toFixed(2);
    let bStr = b.toFixed(2);
    funcBox.innerText = `y = ${aStr}x + ${bStr}`;
}

// ========== 触摸控制逻辑 ==========
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    lastTouch = { x: touch.clientX, y: touch.clientY };
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touches = e.touches;

    // 单指：平移直线（修改截距b）
    if (touches.length === 1) {
        const touch = touches[0];
        const dx = touch.clientX - lastTouch.x;
        const dy = lastTouch.y - touch.clientY;

        // 平移量转换为坐标系截距
        b += dy / gridSize;
        lastTouch = { x: touch.clientX, y: touch.clientY };
    }

    // 双指：旋转直线（修改斜率a）
    if (touches.length === 2) {
        const t1 = touches[0];
        const t2 = touches[1];
        // 计算双指夹角，转换为斜率
        const angle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX);
        a = -Math.tan(angle);
    }

    // 刷新画面
    drawCoordinate();
    drawLine();
    updateFunc();
});

// ========== 初始化 ==========
drawCoordinate();
drawLine();
updateFunc();

// 窗口大小变化适配
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
    drawCoordinate();
    drawLine();
});
</script>
</body>
</html>
